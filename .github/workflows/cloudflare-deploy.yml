# Deploy Cloudflare Worker for jq API
# All actions pinned to commit hashes for reproducibility
name: Deploy Cloudflare Worker

on:
  push:
    branches: [main, master]
    paths:
      - "cloudflare-worker/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Worker
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Run worker tests
        working-directory: cloudflare-worker
        run: node test.js

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-22.04
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0d647bdbc10d1fef555c96562e285d3659e4 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-worker
