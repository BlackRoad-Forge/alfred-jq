# Release workflow - builds and publishes Alfred workflow package
# All actions pinned to commit hashes for reproducibility
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run tests before release
        run: |
          pip install pytest==8.3.4
          python -m pytest tests/ -v

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Alfred Workflow package
        run: |
          WORKFLOW_DIR=$(mktemp -d)
          cp -r complete_keys.py info.plist icon.png error.png workflow/ "$WORKFLOW_DIR/"
          cd "$WORKFLOW_DIR"
          zip -r "$GITHUB_WORKSPACE/jq.alfredworkflow" . -x "*.pyc" -x "__pycache__/*" -x ".git/*"
          cd "$GITHUB_WORKSPACE"
          echo "Built jq.alfredworkflow ($(du -h jq.alfredworkflow | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "alfred-jq v${{ steps.version.outputs.version }}"
          body: |
            ## alfred-jq v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `jq.alfredworkflow` below
            2. Double-click to install in Alfred
            3. Ensure `jq` is installed (`brew install jq`)

            ### Requirements
            - [Alfred](https://alfredapp.com/) with Powerpack
            - [jq](https://stedolan.github.io/jq/) (`brew install jq`)
          files: jq.alfredworkflow
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
