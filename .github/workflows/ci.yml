# CI Pipeline - Lint, Test, and Validate
# All actions pinned to commit hashes for reproducibility
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8==7.1.1 pycodestyle==2.12.1

      - name: Run flake8
        run: flake8 complete_keys.py --max-line-length=120 --ignore=E501,W503

  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install test dependencies
        run: pip install pytest==8.3.4

      - name: Run tests
        run: python -m pytest tests/ -v

  validate-workflow:
    name: Validate Alfred Workflow
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate info.plist exists
        run: |
          test -f info.plist || (echo "ERROR: info.plist missing" && exit 1)

      - name: Validate workflow structure
        run: |
          test -f complete_keys.py || (echo "ERROR: complete_keys.py missing" && exit 1)
          test -d workflow || (echo "ERROR: workflow directory missing" && exit 1)
          test -f workflow/__init__.py || (echo "ERROR: workflow module missing" && exit 1)
          test -f icon.png || (echo "ERROR: icon.png missing" && exit 1)
          echo "All workflow files validated successfully"

      - name: Validate info.plist XML
        run: xmllint --noout info.plist
